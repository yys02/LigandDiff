name: liganddiff
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.9
  
  # PyTorch ecosystem
  - pytorch>=1.12.0
  - torchvision
  - torchaudio
  - pytorch-lightning>=1.8.0
  
  # PyTorch Geometric and related
  - torch-geometric>=2.2.0
  - torch-scatter
  - torch-sparse
  - torch-cluster
  - torch-spline-conv
  
  # Scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  
  # Chemistry libraries
  - rdkit>=2022.9.1
  - openbabel>=3.1.1
  
  # Visualization and plotting
  - matplotlib>=3.5.0
  - imageio>=2.9.0
  
  # Configuration and utilities
  - pyyaml>=6.0
  - wandb>=0.13.0
  
  # Additional utilities
  - pathlib2>=2.3.0
  - tempfile
  - argparse
  - datetime
  - os
  - sys
  - pwd
  - warnings
  - typing
  - math
  - glob
  - random
  
  # Development tools (optional)
  - pip
  - jupyter
  - ipykernel
  
  # Pip-only packages
  - pip:
    - molSimplify>=2.0.0
    - openbabel-python3>=3.1.1