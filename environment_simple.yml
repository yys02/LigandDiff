name: liganddiff
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.9
  
  # PyTorch ecosystem (optimized for CUDA 12.4)
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pytorch-lightning>=2.0.0
  
  # Scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  - scikit-learn>=1.0.0
  
  # Chemistry libraries
  - rdkit>=2022.9.1
  
  # Visualization and plotting
  - matplotlib>=3.5.0
  - imageio>=2.9.0
  
  # Configuration and utilities
  - pyyaml>=6.0
  - wandb>=0.13.0
  
  # Development tools (optional)
  - pip
  - jupyter
  - ipykernel
  
  # Pip-only packages
  - pip:
    - molSimplify>=2.0.0